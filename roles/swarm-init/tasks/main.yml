---
# Docker Swarm initialization
# Handles both manager and worker node setup

- name: Ensure Docker is installed
  ansible.builtin.package:
    name: docker.io
    state: present
  when: ansible_os_family == 'Debian'

- name: Ensure Docker is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Disable live-restore (incompatible with Swarm)
  ansible.builtin.copy:
    content: |
      {
        "live-restore": false,
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: Restart Docker

- name: Check Swarm status
  ansible.builtin.command: docker info --format '{{ '{{' }} .Swarm.LocalNodeState {{ '}}' }}'
  register: swarm_state
  changed_when: false

# Manager initialization
- name: Initialize Swarm on manager
  ansible.builtin.command: >
    docker swarm init
    --advertise-addr {{ swarm_advertise_interface }}
    --default-addr-pool {{ swarm_default_addr_pool }}
    --default-addr-pool-mask-length {{ swarm_default_addr_pool_mask_length }}
  when:
    - inventory_hostname in groups['swarm_managers']
    - swarm_state.stdout != 'active'
  register: swarm_init_result

- name: Get worker join token
  ansible.builtin.command: docker swarm join-token worker -q
  register: swarm_worker_token
  changed_when: false
  when: inventory_hostname in groups['swarm_managers']
  run_once: true

- name: Get manager join token
  ansible.builtin.command: docker swarm join-token manager -q
  register: swarm_manager_token
  changed_when: false
  when: inventory_hostname in groups['swarm_managers']
  run_once: true

- name: Store join tokens as facts
  ansible.builtin.set_fact:
    swarm_worker_join_token: "{{ swarm_worker_token.stdout }}"
    swarm_manager_join_token: "{{ swarm_manager_token.stdout }}"
    swarm_manager_addr: "{{ hostvars[groups['swarm_managers'][0]]['swarm_advertise_interface'] }}:{{ swarm_manager_port }}"
  when: inventory_hostname in groups['swarm_managers']
  run_once: true

# Worker join
- name: Join Swarm as worker
  ansible.builtin.command: >
    docker swarm join
    --token {{ hostvars[groups['swarm_managers'][0]]['swarm_worker_join_token'] }}
    {{ hostvars[groups['swarm_managers'][0]]['swarm_manager_addr'] }}
  when:
    - inventory_hostname in groups['swarm_workers']
    - swarm_state.stdout != 'active'

# Verify
- name: List Swarm nodes (manager only)
  ansible.builtin.command: docker node ls
  register: swarm_nodes
  changed_when: false
  when: inventory_hostname in groups['swarm_managers']
  run_once: true

- name: Display Swarm nodes
  ansible.builtin.debug:
    msg: "{{ swarm_nodes.stdout_lines }}"
  when:
    - inventory_hostname in groups['swarm_managers']
    - swarm_nodes is defined
  run_once: true
