---
# Create overlay networks for Docker Swarm
# Only runs on manager node

- name: Check existing overlay networks
  ansible.builtin.command: >
    docker network ls --filter driver=overlay --format '{{ '{{' }} .Name {{ '}}' }}'
  register: existing_networks
  changed_when: false
  when: inventory_hostname in groups['swarm_managers']
  run_once: true

- name: Create overlay networks
  ansible.builtin.command: >
    docker network create
    --driver overlay
    --attachable
    {{ '--internal' if (item.internal | default(false)) else '' }}
    --label managed-by=mash-nextgen
    {{ item.name }}
  loop: "{{ swarm_overlay_networks }}"
  when:
    - inventory_hostname in groups['swarm_managers']
    - item.name not in (existing_networks.stdout_lines | default([]))
  run_once: true
  changed_when: true

- name: List overlay networks
  ansible.builtin.command: >
    docker network ls --filter driver=overlay
    --format '{{ '{{' }} .Name {{ '}}' }}'
  register: overlay_networks
  changed_when: false
  when: inventory_hostname in groups['swarm_managers']
  run_once: true

- name: Display overlay networks
  ansible.builtin.debug:
    msg: "{{ overlay_networks.stdout_lines }}"
  when:
    - inventory_hostname in groups['swarm_managers']
    - overlay_networks is defined
  run_once: true
