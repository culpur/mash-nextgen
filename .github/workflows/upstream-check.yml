---
# Check upstream MASH and MDAD for new commits since our last sync.
# Creates a GitHub issue when updates are available so we don't fall behind.

name: Check Upstream Updates

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for subtree merge base

      - name: Get last MASH sync commit
        id: mash_last
        run: |
          # Find the most recent subtree merge for mash-playbook
          LAST_MERGE=$(git log --oneline --all --grep="sync upstream mash-playbook" \
            --grep="Squashed 'upstream/mash-playbook'" --format="%H" -1 2>/dev/null || true)
          if [ -z "$LAST_MERGE" ]; then
            # Fallback: find the initial subtree add
            LAST_MERGE=$(git log --oneline --all --diff-filter=A \
              -- upstream/mash-playbook/.gitignore --format="%H" -1 2>/dev/null || true)
          fi
          LAST_DATE=""
          if [ -n "$LAST_MERGE" ]; then
            LAST_DATE=$(git show -s --format=%ci "$LAST_MERGE" 2>/dev/null || true)
          fi
          echo "commit=$LAST_MERGE" >> "$GITHUB_OUTPUT"
          echo "date=$LAST_DATE" >> "$GITHUB_OUTPUT"

      - name: Get last MDAD sync commit
        id: mdad_last
        run: |
          LAST_MERGE=$(git log --oneline --all --grep="sync upstream matrix-docker-ansible-deploy" \
            --grep="Squashed 'upstream/matrix-docker-ansible-deploy'" --format="%H" -1 2>/dev/null || true)
          if [ -z "$LAST_MERGE" ]; then
            LAST_MERGE=$(git log --oneline --all --diff-filter=A \
              -- upstream/matrix-docker-ansible-deploy/.gitignore --format="%H" -1 2>/dev/null || true)
          fi
          LAST_DATE=""
          if [ -n "$LAST_MERGE" ]; then
            LAST_DATE=$(git show -s --format=%ci "$LAST_MERGE" 2>/dev/null || true)
          fi
          echo "commit=$LAST_MERGE" >> "$GITHUB_OUTPUT"
          echo "date=$LAST_DATE" >> "$GITHUB_OUTPUT"

      - name: Check MASH upstream for new commits
        id: mash_check
        run: |
          UPSTREAM_HEAD=$(git ls-remote https://github.com/mother-of-all-self-hosting/mash-playbook.git main | awk '{print $1}')
          LOCAL_HEAD=$(git log --format="%H" -1 -- upstream/mash-playbook/ 2>/dev/null || echo "none")

          echo "upstream=$UPSTREAM_HEAD" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL_HEAD" >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_HEAD" = "$LOCAL_HEAD" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

          # Fetch just the commit log from upstream (shallow clone to temp dir)
          TMPDIR=$(mktemp -d)
          git clone --bare --filter=blob:none --single-branch --branch main \
            https://github.com/mother-of-all-self-hosting/mash-playbook.git "$TMPDIR" 2>/dev/null

          SINCE="${{ steps.mash_last.outputs.date }}"
          if [ -n "$SINCE" ]; then
            COMMITS=$(git -C "$TMPDIR" log --oneline --since="$SINCE" --max-count=30 2>/dev/null || echo "Unable to fetch commits")
          else
            COMMITS=$(git -C "$TMPDIR" log --oneline --max-count=15 2>/dev/null || echo "Unable to fetch commits")
          fi
          rm -rf "$TMPDIR"

          # Write commits to file (multiline output)
          echo "$COMMITS" > /tmp/mash_commits.txt
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || echo "0")
          echo "count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"

      - name: Check MDAD upstream for new commits
        id: mdad_check
        run: |
          UPSTREAM_HEAD=$(git ls-remote https://github.com/spantaleev/matrix-docker-ansible-deploy.git master | awk '{print $1}')
          LOCAL_HEAD=$(git log --format="%H" -1 -- upstream/matrix-docker-ansible-deploy/ 2>/dev/null || echo "none")

          echo "upstream=$UPSTREAM_HEAD" >> "$GITHUB_OUTPUT"
          echo "local=$LOCAL_HEAD" >> "$GITHUB_OUTPUT"

          if [ "$UPSTREAM_HEAD" = "$LOCAL_HEAD" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

          TMPDIR=$(mktemp -d)
          git clone --bare --filter=blob:none --single-branch --branch master \
            https://github.com/spantaleev/matrix-docker-ansible-deploy.git "$TMPDIR" 2>/dev/null

          SINCE="${{ steps.mdad_last.outputs.date }}"
          if [ -n "$SINCE" ]; then
            COMMITS=$(git -C "$TMPDIR" log --oneline --since="$SINCE" --max-count=30 2>/dev/null || echo "Unable to fetch commits")
          else
            COMMITS=$(git -C "$TMPDIR" log --oneline --max-count=15 2>/dev/null || echo "Unable to fetch commits")
          fi
          rm -rf "$TMPDIR"

          echo "$COMMITS" > /tmp/mdad_commits.txt
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || echo "0")
          echo "count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create issue if updates available
        if: steps.mash_check.outputs.has_updates == 'true' || steps.mdad_check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const mashUpdates = '${{ steps.mash_check.outputs.has_updates }}' === 'true';
            const mdadUpdates = '${{ steps.mdad_check.outputs.has_updates }}' === 'true';
            const fs = require('fs');

            let body = '## Upstream Updates Available\n\n';
            body += 'The weekly upstream check found new commits that should be synced.\n\n';

            if (mashUpdates) {
              const mashCommits = fs.readFileSync('/tmp/mash_commits.txt', 'utf8').trim();
              body += '### MASH Playbook\n\n';
              body += `- **Upstream HEAD:** \`${{ steps.mash_check.outputs.upstream }}\`\n`;
              body += `- **Our last sync:** \`${{ steps.mash_last.outputs.date || 'unknown' }}\`\n`;
              body += `- **New commits (~${{ steps.mash_check.outputs.count }}):**\n\n`;
              body += '```\n' + mashCommits + '\n```\n\n';
            }

            if (mdadUpdates) {
              const mdadCommits = fs.readFileSync('/tmp/mdad_commits.txt', 'utf8').trim();
              body += '### matrix-docker-ansible-deploy\n\n';
              body += `- **Upstream HEAD:** \`${{ steps.mdad_check.outputs.upstream }}\`\n`;
              body += `- **Our last sync:** \`${{ steps.mdad_last.outputs.date || 'unknown' }}\`\n`;
              body += `- **New commits (~${{ steps.mdad_check.outputs.count }}):**\n\n`;
              body += '```\n' + mdadCommits + '\n```\n\n';
            }

            body += '### Sync Instructions\n\n';
            body += '```bash\n';
            body += '# Sync both upstreams\n';
            body += './scripts/upstream-sync.sh both\n\n';
            body += '# Or sync individually\n';
            body += './scripts/upstream-sync.sh mash\n';
            body += './scripts/upstream-sync.sh mdad\n';
            body += '```\n\n';
            body += 'After syncing, check for conflicts with our wrapper roles:\n';
            body += '```bash\n';
            body += 'git diff HEAD~1 -- upstream/\n';
            body += '```\n';

            // Check for existing open issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync',
              per_page: 1,
            });

            if (existingIssues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: body,
              });
              console.log(`Updated existing issue #${existingIssues.data[0].number}`);
            } else {
              // Create new issue
              const sources = [];
              if (mashUpdates) sources.push('MASH');
              if (mdadUpdates) sources.push('MDAD');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Upstream updates available: ${sources.join(' + ')}`,
                body: body,
                labels: ['upstream-sync', 'maintenance'],
              });
              console.log('Created new upstream sync issue');
            }
